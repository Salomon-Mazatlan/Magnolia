# Builds the Magnolia manual (VitePress, in manual/) and publishes it to
# GitHub Pages at https://caledavis.github.io/Magnolia/.
#
# One-time setup: repo Settings → Pages → "Build and deployment" →
# Source: "GitHub Actions". After that, every push to main that touches
# manual/ rebuilds and redeploys the manual automatically.

name: Deploy manual

on:
  push:
    branches: [main]
    paths:
      - 'manual/**'
      - '.github/workflows/manual.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: manual
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: manual/package-lock.json

      - run: npm ci
      - run: npm run build   # outputs manual/.vitepress/dist

      - uses: actions/upload-pages-artifact@v3
        with:
          path: manual/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
